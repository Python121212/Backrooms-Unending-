<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms - High Quality Texture</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffff00; pointer-events: none; text-shadow: 1px 1px #000; font-family: sans-serif; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">LEVEL 0<br>テクスチャの密度と鮮明度を調整しました</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a05);
        scene.fog = new THREE.Fog(0x1a1a05, 1, 28);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ライト（壁をしっかり照らす）
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pLight = new THREE.PointLight(0xffffcc, 1.5, 15);
        scene.add(pLight);

        // --- 【重要】テクスチャの最適化設定 ---
        const loader = new THREE.TextureLoader();
        // ※ 'wallpaper.jpg' は保存したファイル名に変えてください
        const wallTex = loader.load('wallpaper.jpg', (tex) => {
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            // 1つの壁（幅6m）に対して模様を横に2回、縦に1回繰り返す
            tex.repeat.set(2, 1); 
            // 斜めから見た時のボヤけを防ぐ
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        });

        const wallMat = new THREE.MeshStandardMaterial({ 
            map: wallTex, 
            color: 0xd9c585, // 画像がない時の下地色
            roughness: 0.9,
            metalness: 0.0
        });

        // --- 無限生成ロジック（簡略版） ---
        const GRID_SIZE = 6;
        const VIEW = 6;
        const chunks = new Map();
        const wallGeo = new THREE.BoxGeometry(GRID_SIZE, 4, 0.2);

        function updateWorld() {
            const px = Math.round(camera.position.x / GRID_SIZE);
            const pz = Math.round(camera.position.z / GRID_SIZE);

            for (let x = px - VIEW; x <= px + VIEW; x++) {
                for (let z = pz - VIEW; z <= pz + VIEW; z++) {
                    const key = `${x},${z}`;
                    if (!chunks.has(key)) {
                        const rnd = Math.abs(Math.sin(x * 12.9 + z * 78.2));
                        if (rnd < 0.3 && (Math.abs(x) > 1 || Math.abs(z) > 1)) {
                            const wall = new THREE.Mesh(wallGeo, wallMat);
                            wall.position.set(x * GRID_SIZE, 2, z * GRID_SIZE);
                            wall.rotation.y = rnd > 0.15 ? 0 : Math.PI / 2;
                            scene.add(wall);
                            chunks.set(key, wall);
                        } else { chunks.set(key, null); }
                    }
                }
            }
        }

        // --- 描画ループ ---
        function animate() {
            requestAnimationFrame(animate);
            pLight.position.copy(camera.position);
            updateWorld();
            renderer.render(scene, camera);
        }
        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
