<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms Web - Alpha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffff00; pointer-events: none; text-shadow: 2px 2px #000; font-size: 14px; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,0,0.05); pointer-events: none; }
        /* アナログビデオ風のノイズ（CSSフィルタ） */
        #vhs { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.08; pointer-events: none; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png'); }
    </style>
</head>
<body>
    <div id="vhs"></div>
    <div id="overlay"></div>
    <div id="ui">LEVEL 0 - "The Lobby"<br>左側: 移動 / 右側: 視点</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 設定 ---
        const GRID_SIZE = 6; // 壁の間隔
        const CHUNK_RADIUS = 5; // 描画する範囲
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222200);
        scene.fog = new THREE.FogExp2(0x222200, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const flashlight = new THREE.PointLight(0xfff5cc, 1.2, 15);
        scene.add(flashlight);
        scene.add(new THREE.AmbientLight(0x666644, 0.4));

        // --- マテリアル（リアルな質感） ---
        const textureLoader = new THREE.TextureLoader();
        // 簡易的なテクスチャ生成（本来は外部画像を読み込むが、ここではプログラムで作成）
        const createTexture = (color) => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0,0,256,256);
            for(let i=0; i<2000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.1})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        };

        const wallMat = new THREE.MeshStandardMaterial({ 
            map: createTexture('#e2d08a'), 
            roughness: 0.4, 
            metalness: 0.0 
        });
        const floorMat = new THREE.MeshStandardMaterial({ 
            map: createTexture('#7e7354'), 
            roughness: 0.6 
        });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- チャンク生成システム ---
        const wallGroups = new Map();
        const wallGeo = new THREE.BoxGeometry(GRID_SIZE, 4, 0.5);

        function updateMap() {
            const playerX = Math.round(camera.position.x / GRID_SIZE);
            const playerZ = Math.round(camera.position.z / GRID_SIZE);

            for (let x = playerX - CHUNK_RADIUS; x <= playerX + CHUNK_RADIUS; x++) {
                for (let z = playerZ - CHUNK_RADIUS; z <= playerZ + CHUNK_RADIUS; z++) {
                    const key = `${x},${z}`;
                    if (!wallGroups.has(key)) {
                        // 擬似乱数で壁を配置（シード値固定で再現性を持たせる）
                        const rand = Math.abs(Math.sin(x * 12.9898 + z * 78.233) * 43758.5453) % 1;
                        if (rand > 0.7) {
                            const group = new THREE.Group();
                            const wall = new THREE.Mesh(wallGeo, wallMat);
                            wall.position.set(x * GRID_SIZE, 2, z * GRID_SIZE);
                            wall.rotation.y = (rand > 0.85) ? 0 : Math.PI / 2;
                            group.add(wall);
                            scene.add(group);
                            wallGroups.set(key, group);
                        }
                    }
                }
            }
            // 遠くの壁を削除して軽量化
            for (let [key, group] of wallGroups) {
                const [kx, kz] = key.split(',').map(Number);
                if (Math.abs(kx - playerX) > CHUNK_RADIUS + 1 || Math.abs(kz - playerZ) > CHUNK_RADIUS + 1) {
                    scene.remove(group);
                    wallGroups.delete(key);
                }
            }
        }

        // --- 操作系 ---
        let moveData = { x: 0, y: 0, id: null };
        let lookData = { lastX: null, lastY: null, id: null };
        let lat = 0, lon = 0;

        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth / 2) moveData.id = t.identifier;
                else lookData.id = t.identifier;
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === moveData.id) {
                    moveData.y = (t.clientY - (window.innerHeight - 100)) * -0.01;
                } else if(t.identifier === lookData.id) {
                    if(lookData.lastX !== null) {
                        lon += (t.pageX - lookData.lastX) * 0.3;
                        lat -= (t.pageY - lookData.lastY) * 0.3;
                        lat = Math.max(-85, Math.min(85, lat));
                    }
                    lookData.lastX = t.pageX; lookData.lastY = t.pageY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === moveData.id) moveData.y = 0;
                if(t.identifier === lookData.id) { lookData.lastX = null; lookData.lastY = null; }
            }
        });

        // --- ループ ---
        const target = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate);

            // 視点更新
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            target.setFromSphericalCoords(1, phi, theta).add(camera.position);
            camera.lookAt(target);

            // 移動（スマホ＆簡易衝突判定なし）
            if(moveData.y !== 0) camera.translateZ(-Math.max(-0.15, Math.min(0.15, moveData.y)));
            camera.position.y = 1.6;

            // ライトと無限処理
            flashlight.position.copy(camera.position);
            floor.position.x = Math.round(camera.position.x / 20) * 20;
            floor.position.z = Math.round(camera.position.z / 20) * 20;

            updateMap();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
