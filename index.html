<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms - Lights Back</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffff00; z-index: 5; text-shadow: 1px 1px #000; pointer-events: none; font-size: 12px; }
        #joy-base { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #joy-knob { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; left: 30px; top: 30px; }
    </style>
</head>
<body>
    <div id="ui">LEVEL 0<br>蛍光灯を再配置し、照明を強化しました。</div>
    <div id="joy-base"><div id="joy-knob"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const GRID_SIZE = 5;
        const VIEW = 8;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a05);
        scene.fog = new THREE.Fog(0x1a1a05, 1, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        // 全体の明るさを少し下げて、蛍光灯の光を際立たせる
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        
        // プレイヤーの周囲を照らすライト（補助）
        const pLight = new THREE.PointLight(0xffffcc, 1.5, 8);
        scene.add(pLight);

        const loader = new THREE.TextureLoader();
        const wallTex = loader.load('wallpaper.jpg', (tex) => {
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(1.5, 1.2);
        });

        const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, color: 0xd9c585 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7e6e3d });
        const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xeeeecc });
        
        // 蛍光灯自体の光る質感
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), floorMat);
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), ceilingMat);
        ceiling.rotation.x = Math.PI/2; ceiling.position.y = 3.8; scene.add(ceiling);

        const chunks = new Map();
        const colliders = [];
        const wallGeo = new THREE.BoxGeometry(GRID_SIZE + 0.4, 3.8, 0.6);

        function pseudoRandom(x, z) {
            const f = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
            return f - Math.floor(f);
        }

        function updateWorld() {
            const px = Math.round(camera.position.x / GRID_SIZE);
            const pz = Math.round(camera.position.z / GRID_SIZE);

            for (let x = px - VIEW; x <= px + VIEW; x++) {
                for (let z = pz - VIEW; z <= pz + VIEW; z++) {
                    const key = `${x},${z}`;
                    if (!chunks.has(key)) {
                        const group = new THREE.Group();
                        
                        // 初期地点の空地
                        if (Math.abs(x) < 2 && Math.abs(z) < 2) {
                            chunks.set(key, null);
                            continue;
                        }

                        // 【修正】蛍光灯を3グリッドおきに必ず配置
                        if (x % 3 === 0 && z % 3 === 0) {
                            const l = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.7), lightMat);
                            l.position.set(x * GRID_SIZE, 3.79, z * GRID_SIZE);
                            l.rotation.x = Math.PI/2;
                            group.add(l);

                            // 天井の光を床に落とすライト
                            const point = new THREE.PointLight(0xffffdd, 0.8, 7);
                            point.position.set(x * GRID_SIZE, 3.5, z * GRID_SIZE);
                            group.add(point);
                        }

                        // 壁の生成（密度40%）
                        if (pseudoRandom(x, z) < 0.4) {
                            const w = new THREE.Mesh(wallGeo, wallMat);
                            w.position.set(x * GRID_SIZE, 1.9, z * GRID_SIZE);
                            w.rotation.y = pseudoRandom(z, x) > 0.5 ? 0 : Math.PI/2;
                            group.add(w);
                            colliders.push(w);
                        }

                        scene.add(group);
                        chunks.set(key, group);
                    }
                }
            }
        }

        // --- 操作系（スライド移動） ---
        let moveID = null, lookID = null;
        let moveData = { x: 0, y: 0, startX: 0, startY: 0 }, lookData = { lastX: 0, lastY: 0 };
        let lon = 0, lat = 0, targetLon = 0, targetLat = 0;
        const joyBase = document.getElementById('joy-base'), joyKnob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2 && moveID === null) {
                    moveID = t.identifier; moveData.startX = t.clientX; moveData.startY = t.clientY;
                    joyBase.style.display = 'block'; joyBase.style.left = (t.clientX-50)+'px'; joyBase.style.top = (t.clientY-50)+'px';
                } else if(t.clientX >= window.innerWidth/2 && lookID === null) {
                    lookID = t.identifier; lookData.lastX = t.clientX; lookData.lastY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.touches) {
                if(t.identifier === moveID) {
                    let dx = t.clientX - moveData.startX, dy = t.clientY - moveData.startY;
                    const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40), a = Math.atan2(dy,dx);
                    moveData.x = Math.cos(a)*(d/40); moveData.y = Math.sin(a)*(d/40);
                    joyKnob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                }
                if(t.identifier === lookID) {
                    targetLon -= (t.clientX - lookData.lastX) * 0.4;
                    targetLat -= (t.clientY - lookData.lastY) * 0.4;
                    targetLat = Math.max(-85, Math.min(85, targetLat));
                    lookData.lastX = t.clientX; lookData.lastY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === moveID) { moveID=null; moveData.x=0; moveData.y=0; joyBase.style.display='none'; }
                if(t.identifier === lookID) lookID=null;
            }
        });

        const pBox = new THREE.Box3();
        const wBox = new THREE.Box3();
        function checkCol(pos) {
            pBox.setFromCenterAndSize(pos, new THREE.Vector3(0.5, 2.0, 0.5));
            for (let w of colliders) {
                wBox.setFromObject(w);
                if (pBox.intersectsBox(wBox)) return true;
            }
            return false;
        }

        const dir = new THREE.Vector3(), side = new THREE.Vector3(), up = new THREE.Vector3(0,1,0);
        function animate() {
            requestAnimationFrame(animate);
            lon += (targetLon - lon) * 0.2; lat += (targetLat - lat) * 0.2;
            camera.lookAt(new THREE.Vector3().setFromSphericalCoords(1, THREE.MathUtils.degToRad(90-lat), THREE.MathUtils.degToRad(lon)).add(camera.position));

            if(moveID !== null) {
                camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                side.crossVectors(up, dir).normalize();
                const speed = 0.12;
                const vx = (dir.x * -moveData.y + side.x * -moveData.x) * speed;
                const vz = (dir.z * -moveData.y + side.z * -moveData.x) * speed;
                
                const nextX = camera.position.clone(); nextX.x += vx;
                if (!checkCol(nextX)) camera.position.x = nextX.x;
                const nextZ = camera.position.clone(); nextZ.z += vz;
                if (!checkCol(nextZ)) camera.position.z = nextZ.z;
            }
            pLight.position.copy(camera.position);
            updateWorld();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
