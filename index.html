<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms - Multi-Touch FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #joy-base { position: absolute; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: none; pointer-events: none; z-index: 10; }
        #joy-knob { position: absolute; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; left: 35px; top: 35px; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffff00; pointer-events: none; text-shadow: 1px 1px #000; font-weight: bold; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.3); pointer-events: none; font-size: 24px; }
    </style>
</head>
<body>
    <div id="ui">LEVEL 0<br>両指の同時操作に対応しました</div>
    <div id="crosshair">+</div>
    <div id="joy-base"><div id="joy-knob"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン・ライティング ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a15);
        scene.fog = new THREE.Fog(0x2a2a15, 1, 45);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffee, 0.7));
        const light = new THREE.PointLight(0xffffcc, 1.2, 18);
        scene.add(light);

        // --- 壁と床の生成 ---
        const createTex = (c) => {
            const cv = document.createElement('canvas'); cv.width = 128; cv.height = 128;
            const cx = cv.getContext('2d'); cx.fillStyle = c; cx.fillRect(0,0,128,128);
            for(let i=0;i<400;i++){ cx.fillStyle=`rgba(0,0,0,0.06)`; cx.fillRect(Math.random()*128,Math.random()*128,2,2); }
            return new THREE.CanvasTexture(cv);
        };
        const wallMat = new THREE.MeshStandardMaterial({ map: createTex('#d9c585'), roughness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ map: createTex('#8e7e4d'), roughness: 0.9 }));
        floor.rotation.x = -Math.PI / 2; scene.add(floor);

        const walls = [];
        const wallGeo = new THREE.BoxGeometry(6, 4, 0.8);
        for(let i=0; i<60; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            const rx = Math.floor(Math.random()*20-10)*6;
            const rz = Math.floor(Math.random()*20-10)*6;
            if(Math.abs(rx) < 5 && Math.abs(rz) < 5) continue;
            wall.position.set(rx, 2, rz);
            wall.rotation.y = Math.random() > 0.5 ? 0 : Math.PI/2;
            scene.add(wall);
            walls.push(wall);
        }

        // --- 【重要】マルチタッチ操作ロジック ---
        const joyBase = document.getElementById('joy-base');
        const joyKnob = document.getElementById('joy-knob');
        
        let moveTouchID = null;
        let lookTouchID = null;
        
        let moveData = { x: 0, y: 0, startX: 0, startY: 0 };
        let lookData = { lastX: 0, lastY: 0 };
        
        let lon = 0, lat = 0;
        let targetLon = 0, targetLat = 0;
        const lerpFactor = 0.2; // 追従速度を少し上げました

        window.addEventListener('touchstart', (e) => {
            for(let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                // 左半分：移動開始
                if(t.clientX < window.innerWidth / 2 && moveTouchID === null) {
                    moveTouchID = t.identifier;
                    moveData.startX = t.clientX;
                    moveData.startY = t.clientY;
                    joyBase.style.display = 'block';
                    joyBase.style.left = `${t.clientX - 60}px`;
                    joyBase.style.top = `${t.clientY - 60}px`;
                } 
                // 右半分：視点移動開始
                else if(t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    lookData.lastX = t.clientX;
                    lookData.lastY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            // changedTouchesではなく、すべての現在進行中のtouchesをチェックする
            for(let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                
                if(t.identifier === moveTouchID) {
                    let dx = t.clientX - moveData.startX;
                    let dy = t.clientY - moveData.startY;
                    const maxDist = 50;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxDist);
                    const angle = Math.atan2(dy, dx);
                    moveData.x = Math.cos(angle) * (dist / maxDist);
                    moveData.y = Math.sin(angle) * (dist / maxDist);
                    joyKnob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                } 
                
                if(t.identifier === lookTouchID) {
                    const deltaX = t.clientX - lookData.lastX;
                    const deltaY = t.clientY - lookData.lastY;
                    targetLon += deltaX * 0.3;
                    targetLat -= deltaY * 0.3;
                    targetLat = Math.max(-85, Math.min(85, targetLat));
                    lookData.lastX = t.clientX;
                    lookData.lastY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for(let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if(t.identifier === moveTouchID) {
                    moveTouchID = null;
                    moveData.x = 0; moveData.y = 0;
                    joyBase.style.display = 'none';
                    joyKnob.style.transform = `translate(0px, 0px)`;
                } else if(t.identifier === lookTouchID) {
                    lookTouchID = null;
                }
            }
        });

        // --- 移動エンジン ---
        const dir = new THREE.Vector3();
        const side = new THREE.Vector3();
        const up = new THREE.Vector3(0, 1, 0);

        function updateMovement() {
            if(moveTouchID === null) return;
            const speed = 0.15;
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            side.crossVectors(up, dir).normalize();
            const step = new THREE.Vector3()
                .addScaledVector(dir, -moveData.y * speed)
                .addScaledVector(side, -moveData.x * speed);
            const nextPos = camera.position.clone().add(step);
            const pBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.7, 2, 0.7));
            let hit = false;
            for(let w of walls) {
                if(pBox.intersectsBox(new THREE.Box3().setFromObject(w))) { hit = true; break; }
            }
            if(!hit) camera.position.copy(nextPos);
        }

        // --- アニメーションループ ---
        const lookTarget = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate);

            // 視点の滑らかな補間
            lon += (targetLon - lon) * lerpFactor;
            lat += (targetLat - lat) * lerpFactor;

            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            lookTarget.setFromSphericalCoords(1, phi, theta).add(camera.position);
            camera.lookAt(lookTarget);

            updateMovement();
            camera.position.y = 1.6;
            light.position.copy(camera.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
